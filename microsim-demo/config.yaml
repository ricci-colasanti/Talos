simulation:
  iterations: 10
  population_file: "population.csv"
  output_file: "output.csv"
  random_seed: 42
  verbose: true

# Statistics definitions - fully configurable, no hardcoded columns!
statistics:
  # Population counts
  - name: "population_total"
    description: "Total population"
    query: "SELECT COUNT(*) as total FROM population"
  
  # Alive/dead counts
  - name: "population_status"
    description: "Alive and dead counts"
    query: |
      SELECT 
        COUNT(CASE WHEN alive = true THEN 1 END) as alive,
        COUNT(CASE WHEN alive = false THEN 1 END) as dead
      FROM population
  
  # Age distribution (alive only)
  - name: "age_distribution"
    description: "Age groups (alive only)"
    query: |
      SELECT 
        COUNT(CASE WHEN age < 18 THEN 1 END) as children_0_17,
        COUNT(CASE WHEN age >= 18 AND age < 65 THEN 1 END) as adults_18_64,
        COUNT(CASE WHEN age >= 65 AND age < 85 THEN 1 END) as elderly_65_84,
        COUNT(CASE WHEN age >= 85 THEN 1 END) as super_elderly_85_plus
      FROM population
      WHERE alive = true
  
  # Area distribution
  - name: "area_distribution"
    description: "Population by area"
    query: |
      SELECT 
        area,
        COUNT(*) as total,
        COUNT(CASE WHEN alive = true THEN 1 END) as alive
      FROM population
      GROUP BY area
      ORDER BY area
  
  # Migration statistics
  - name: "migration_stats"
    description: "Migration statistics"
    query: |
      SELECT 
        COUNT(CASE WHEN previous_area != area THEN 1 END) as migrants,
        COUNT(*) as total,
        CAST(COUNT(CASE WHEN previous_area != area THEN 1 END) AS FLOAT) / COUNT(*) * 100 as migration_rate_pct
      FROM population
      WHERE alive = true
  
  # Average age by area
  - name: "avg_age_by_area"
    description: "Average age by area"
    query: |
      SELECT 
        area,
        AVG(age) as avg_age,
        COUNT(*) as population
      FROM population
      WHERE alive = true
      GROUP BY area
      ORDER BY area

# Model definitions
models:
  # Model 1: Age increment (highest priority - runs first)
  - name: "age_increment"
    type: "sql_update"
    priority: 1
    enabled: true
    description: "Increment everyone's age by 1 year"
    parameters:
      query: |
        UPDATE population 
        SET age = age + 1 
        WHERE alive = true

  # Model 2: Mortality (second priority)
  - name: "mortality"
    type: "sql_update"
    priority: 2
    enabled: true
    description: "Age-specific mortality model"
    parameters:
      mortality_rates:
        infant: 0.005
        child: 0.0005
        adult: 0.001
        elderly: 0.10
        super_elderly: 0.20
      query: |
        UPDATE population 
        SET alive = false 
        WHERE 
          alive = true AND (
            (age < 1 AND random() < {mortality_rates.infant}) OR
            (age >= 1 AND age < 5 AND random() < {mortality_rates.child}) OR
            (age >= 18 AND age < 65 AND random() < {mortality_rates.adult}) OR
            (age >= 65 AND age < 85 AND random() < {mortality_rates.elderly}) OR
            (age >= 85 AND random() < {mortality_rates.super_elderly})
          )

  # Model 3: Migration (third priority)
  - name: "migration"
    type: "sql_update"
    priority: 3
    enabled: true
    description: "Age-based migration between areas"
    parameters:
      # Migration probabilities by age group
      migration_rates:
        child_0_17: 0.02      # 2% chance per year for children
        adult_18_34: 0.08     # 8% chance for young adults (most mobile)
        adult_35_64: 0.03     # 3% chance for middle-aged
        elderly_65_plus: 0.01 # 1% chance for elderly
      
      # Random seed for migration (can be separate from main seed)
      migration_seed: 12345
      
      # The SQL query with parameter placeholders
      query: |
        -- Save current area for migration statistics
        UPDATE population 
        SET previous_area = area 
        WHERE alive = true;
        
        -- Apply migration based on age group
        UPDATE population 
        SET area = 
          CASE 
            -- Children (0-17)
            WHEN age < 18 AND alive = true AND random() < {migration_rates.child_0_17} 
              THEN CAST(abs(random() % 5) + 1 AS INTEGER)  -- Random area 1-5
            -- Young adults (18-34) - most mobile
            WHEN age >= 18 AND age < 35 AND alive = true AND random() < {migration_rates.adult_18_34} 
              THEN CAST(abs(random() % 5) + 1 AS INTEGER)
            -- Middle-aged adults (35-64)
            WHEN age >= 35 AND age < 65 AND alive = true AND random() < {migration_rates.adult_35_64} 
              THEN CAST(abs(random() % 5) + 1 AS INTEGER)
            -- Elderly (65+)
            WHEN age >= 65 AND alive = true AND random() < {migration_rates.elderly_65_plus} 
              THEN CAST(abs(random() % 5) + 1 AS INTEGER)
            ELSE area
          END
        WHERE alive = true